<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Panel</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px}
input,select{width:100%;padding:10px;margin:5px 0}
button{padding:10px 15px;background:#d32f2f;color:#fff;border:none;border-radius:5px;cursor:pointer}
.card{background:#fff;padding:10px;margin:10px 0;border-radius:10px}
img{width:100px}
</style>

</head>

<body>

<h2>Admin Login</h2>

<div id="loginBox">
<input id="adminEmail" placeholder="Email">
<input id="adminPassword" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="adminPanel" style="display:none">

<h2>Add Product</h2>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="image" placeholder="Image URL">
<select id="category">
<option>Tiles</option>
<option>Pipes</option>
<option>Motors</option>
<option>Taps</option>
</select>

<button onclick="addProduct()">Add Product</button>

<h2>All Products</h2>
<div id="productList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { 
getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { 
getAuth, signInWithEmailAndPassword 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
apiKey: "AIzaSyDl2itMcZuynH-oIS0Jn_fDnMSd-ZdP-So",
    authDomain: "ms-uma-tiles.firebaseapp.com",
    projectId: "ms-uma-tiles",
    storageBucket: "ms-uma-tiles.firebasestorage.app",
    messagingSenderId: "103744240101",
    appId: "1:103744240101:web:785e968d6904f79731970c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// LOGIN
window.login = function(){

const email = document.getElementById("adminEmail").value;
const password = document.getElementById("adminPassword").value;

signInWithEmailAndPassword(auth,email,password)
.then(()=>{
document.getElementById("loginBox").style.display="none";
document.getElementById("adminPanel").style.display="block";
loadProducts();
})
.catch(()=>{
alert("Wrong Login");
});

}

// ADD PRODUCT
window.addProduct = async function(){

try{

await addDoc(collection(db,"products"),{

name: document.getElementById("name").value,
price: document.getElementById("price").value,
image: document.getElementById("image").value,
category: document.getElementById("category").value

});

alert("Product Added");

loadProducts();

}catch(e){
alert("Error adding product");
console.error(e);
}

}

// LOAD PRODUCTS
async function loadProducts(){

const list = document.getElementById("productList");
list.innerHTML = "";

const snapshot = await getDocs(collection(db,"products"));

snapshot.forEach(d=>{

const p = d.data();

list.innerHTML += `
<div class="card">

<img src="${p.image}">

<h3>${p.name}</h3>

<p>₹${p.price}</p>

<p>${p.category}</p>

<button onclick="deleteProduct('${d.id}')">Delete</button>
<button onclick="editProduct('${d.id}','${p.name}','${p.price}')">Edit</button>

</div>
`;

});

}

// DELETE
window.deleteProduct = async function(id){

await deleteDoc(doc(db,"products",id));

alert("Deleted");

loadProducts();

}

// EDIT
window.editProduct = async function(id,name,price){

const newName = prompt("New Name",name);
const newPrice = prompt("New Price",price);

await updateDoc(doc(db,"products",id),{
name:newName,
price:newPrice
});

alert("Updated");

loadProducts();

}

</script>

</body>
</html>
