<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Orders</title>
</head>

<body>

<h2>Admin Orders Dashboard</h2>

<div id="orders"></div>

<script type="module">

// 🔥 FIREBASE IMPORT
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 YOUR CONFIG (same as other pages)
const firebaseConfig = {
apiKey: "AIzaSyDl2itMcZuynH-oIS0Jn_fDnMSd-ZdP-So",
    authDomain: "ms-uma-tiles.firebaseapp.com",
    projectId: "ms-uma-tiles",
    storageBucket: "ms-uma-tiles.firebasestorage.app",
    messagingSenderId: "103744240101",
    appId: "1:103744240101:web:785e968d6904f79731970c"
};

// 🔥 INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const div = document.getElementById("orders");

// 🔔 Ask notification permission
if(Notification.permission !== "granted"){
await Notification.requestPermission();
}

// 📦 LOAD ORDERS
const snapshot = await getDocs(collection(db,"orders"));

if(snapshot.empty){
div.innerHTML = "<p>No orders yet</p>";
}

// 🔥 SHOW ORDERS
snapshot.forEach(d=>{

let data = d.data();

// 🔔 Notification when page loads (new orders)
new Notification("New Order Received!");

div.innerHTML += `
<div style="border:1px solid black;padding:15px;margin:15px">
<b>Order ID:</b> ${d.id}<br>
<b>Status:</b> ${data.status}<br><br>

<b>Items:</b><br>
${data.items.map(i=> i.name + " - ₹" + i.price).join("<br>")}

<br><br>

<button onclick="updateStatus('${d.id}','Delivered')">Mark Delivered</button>

</div>
`;

});

// 🔄 UPDATE STATUS
window.updateStatus = async function(id,status){

await updateDoc(doc(db,"orders",id),{
status: status
});

alert("Status Updated");

location.reload();

}

</script>

</body>
</html>
